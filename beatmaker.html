<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEATFORGE - Studio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="db.js"></script>
    <!-- EmailJS for password change verification -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>checkAuth();</script>
</head>
<body class="daw-body">
    <!-- Top Header -->
    <header class="daw-header">
        <div class="header-left">
            <div class="logo glitch" data-text="BEATFORGE">BEATFORGE</div>
            <nav class="header-nav">
                <a href="#" onclick="showSettings()">Ayarlar</a>
                <a href="#" onclick="showMyBeats()">Ritimlerim</a>
                <a href="#" onclick="showMyRecordings()">Kayıtlarım</a>
                <a href="profile.html">Profil</a>
            </nav>
        </div>
        <div class="header-right">
            <span id="welcomeUser" class="user-greeting"></span>
            <button class="daw-btn" onclick="logoutUser()">Çıkış Yap</button>
            <button id="saveBeatBtn" class="daw-btn primary">Projeyi Kaydet</button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="daw-workspace">
        <!-- Sequencer Tracks Area -->
        <section class="sequencer" id="sequencer">
            <div class="sequencer-scroll-container">
                <div class="track step-indicator-track"><div class="track-label" style="opacity:0;"></div><div class="pads-container" id="stepIndicator"></div></div>
                <div class="track" data-instrument="kick"><div class="track-label">Kick</div><div class="pads-container"></div></div>
                <div class="track" data-instrument="snare"><div class="track-label">Snare</div><div class="pads-container"></div></div>
                <div class="track" data-instrument="hihat"><div class="track-label">Hi-Hat</div><div class="pads-container"></div></div>
                <div class="track" data-instrument="openhat"><div class="track-label">O-Hat</div><div class="pads-container"></div></div>
                <div class="track" data-instrument="tom"><div class="track-label">Tom</div><div class="pads-container"></div></div>
                <div class="track" data-instrument="clap"><div class="track-label">Clap</div><div class="pads-container"></div></div>
                <div class="track" data-instrument="perc"><div class="track-label">Perc</div><div class="pads-container"></div></div>
                <div class="track" data-instrument="bass"><div class="track-label">Bass</div><div class="pads-container"></div></div>
                <div class="track step-numbers-track"><div class="track-label" style="opacity:0;"></div><div class="pads-container" id="stepNumbersContainer"></div></div>
            </div>
        </section>
        
        <!-- Recording / Export Side Panel -->
        <aside class="daw-sidebar-right">
            <div class="panel-section">
                <h4>Vokal / Ses Kanalı</h4>
                <input type="file" id="vocalUpload" accept="audio/*" class="daw-input">
                <audio id="vocalAudio" controls controlsList="nodownload" style="width: 100%; display: none; margin-top: 10px;"></audio>
            </div>
            <div class="panel-section">
                <h4>Kayıt &amp; Dışa Aktar</h4>
                <button id="recordBeatOnlyBtn" class="daw-btn w-100">● Sistem Sesini Kaydet</button>
                <button id="recordBtn" class="daw-btn record-mic w-100">🎙️ Mikrofonla Kaydet</button>
            </div>
            <div id="playbackContainer" class="panel-section" style="display:none;">
                <h4 style="color: #10b981;">Kayıt Hazır!</h4>
                <audio id="audioPlayback" controls controlsList="nodownload" style="width: 100%; margin-top: 10px;"></audio>
                <div style="display: flex; gap: 8px; margin-top: 10px;">
                    <button id="saveRecordingBtn" class="daw-btn primary" style="flex:1;">💾 MP3 Kaydet</button>
                    <button class="daw-btn danger" onclick="deleteCurrentRecording()" style="flex:1;">Çöpe At</button>
                </div>
            </div>
        </aside>
    </main>

    <!-- Transport Bar (Bottom) -->
    <footer class="daw-transport">
        <div class="transport-left">
            <button id="clearBtn" class="daw-btn text-btn">Temizle</button>
        </div>
        
        <div class="transport-center">
            <div class="time-display" id="recordTimer">00:00</div>
            <button id="stopBtn" class="transport-btn stop">■</button>
            <button id="playBtn" class="transport-btn play">▶</button>
        </div>

        <div class="transport-right">
            <div class="bpm-control">
                <input type="range" id="bpmSlider" min="60" max="200" value="120">
                <span id="bpmValue" class="val">120</span> <span class="unit">bpm</span>
            </div>
            <select id="stepSelect" class="daw-select">
                <option value="16">16 Adım</option>
                <option value="32">32 Adım</option>
                <option value="48">48 Adım</option>
                <option value="64">64 Adım</option>
            </select>
        </div>
    </footer>

    <!-- Modals -->
    <div id="myBeatsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Ritimlerim</h2>
            <ul id="beatsList" class="beats-list"></ul>
        </div>
    </div>

    <!-- Kayıtlarım Modal -->
    <div id="myRecordingsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeRecordingsModal()">&times;</span>
            <h2>🎵 Kayıtlarım</h2>
            <p style="color: var(--text-secondary); margin-bottom: 15px; font-size: 0.9rem;">Kaydettiğin ses dosyalarını buradan MP3 olarak indirebilirsin.</p>
            <ul id="recordingsList" class="beats-list"></ul>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content" style="max-width: 500px; max-height: 90vh; overflow-y: auto;">
            <span class="close" onclick="closeSettingsModal()">&times;</span>
            <h2>⚙️ Ayarlar</h2>
            
            <!-- Nickname Section -->
            <div class="form-group" style="margin-top:20px;">
                <label>Görünen Adın (Nickname)</label>
                <input type="text" id="nicknameInput" required class="daw-input" style="width:100%;">
            </div>
            <button class="daw-btn primary w-100" onclick="saveNickname()" style="margin-top:10px;">Kaydet</button>
            
        </div>
    </div>

    <!-- Custom Dialog Modals -->
    <div id="customInputModal" class="modal">
        <div class="modal-content" style="max-width: 420px;">
            <h2 id="customInputTitle" style="margin-bottom: 15px;"></h2>
            <input type="text" id="customInputField" class="daw-input" style="width:100%; margin-bottom: 20px; padding: 10px; font-size: 1rem;">
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="daw-btn" id="customInputCancel">İptal</button>
                <button class="daw-btn primary" id="customInputOk">Tamam</button>
            </div>
        </div>
    </div>

    <div id="customAlertModal" class="modal">
        <div class="modal-content" style="max-width: 420px;">
            <p id="customAlertMessage" style="margin-bottom: 20px; font-size: 1rem; line-height: 1.5;"></p>
            <div style="display: flex; justify-content: flex-end;">
                <button class="daw-btn primary" id="customAlertOk">Tamam</button>
            </div>
        </div>
    </div>

    <div id="customConfirmModal" class="modal">
        <div class="modal-content" style="max-width: 420px;">
            <p id="customConfirmMessage" style="margin-bottom: 20px; font-size: 1rem; line-height: 1.5;"></p>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="daw-btn" id="customConfirmCancel">İptal</button>
                <button class="daw-btn primary" id="customConfirmOk">Evet</button>
            </div>
        </div>
    </div>

    <!-- Lamejs for MP3 encoding -->
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Auto-load beat from profile page
        (async () => {
            const loadBeatId = sessionStorage.getItem('loadBeatId');
            if (loadBeatId) {
                sessionStorage.removeItem('loadBeatId');
                await loadBeat(loadBeatId);
            }
        })();
    </script>
</body>
</html>
